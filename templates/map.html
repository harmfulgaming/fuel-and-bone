<!DOCTYPE html>
<html>
<head>
    <title>Map</title>
</head>
<body>

<h1>World Map</h1>

{% for z in zones %}
<div style="margin:10px; border:1px solid black; padding:10px;">
    <h3>{{ z.name }}</h3>
    <button onclick="harvest({{ z.id }}, this)">Harvest</button>
</div>
{% endfor %}

<script>
function harvest(id, btn){
    btn.disabled = true;

    fetch(`/harvest/${id}`, { method: "POST" })
    .then(r => r.json())
    .then(data => {

        if (data.status === "cooldown") {
            alert("⏳ Zone is on cooldown!");
        } 
        else if (data.status === "ok") {
            alert(
                "⛏️ Loot gained:\n" +
                JSON.stringify(data.loot, null, 2)
            );
        } 
        else {
            alert("Something went wrong");
        }

        // small cooldown UX delay (matches backend 20s cooldown)
        setTimeout(() => {
            btn.disabled = false;
        }, 2000);
    });
}
</script>

</body>
</html>
