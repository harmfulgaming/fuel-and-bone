<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SCAV-NET | Tactical Map</title>
    <style>
        :root { --radar: #00ff00; --bg: #050505; }
        body { background: var(--bg); color: var(--radar); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        .map-monitor { width: 100vw; height: 100vh; position: relative; background: radial-gradient(circle at center, #001100 0%, #000 85%); }
        .sweep {
            width: 200vmax; height: 200vmax; position: absolute; top: 50%; left: 50%;
            background: conic-gradient(from 0deg, rgba(0,255,0,0) 90%, rgba(0,255,0,0.15) 100%);
            animation: rotate 10s linear infinite; transform-origin: center; z-index: 10;
        }
        @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        .sector { width: 4px; height: 4px; background: #004400; border-radius: 50%; position: absolute; z-index: 20; }
        .hud { position: absolute; top: 20px; left: 20px; border: 1px solid var(--radar); padding: 15px; background: rgba(0,0,0,0.8); z-index: 100; }
        .back-btn { position: absolute; bottom: 30px; left: 30px; color: var(--radar); border: 1px solid var(--radar); padding: 10px; text-decoration: none; z-index: 101; background: black; }
    </style>
</head>
<body>
    <div class="map-monitor" id="map-container">
        <div class="sweep"></div>
        {% for i in range(300) %}
        <div class="sector" style="top: {{ range(5, 95)|random }}%; left: {{ range(5, 95)|random }}%;"></div>
        {% endfor %}
        <div class="hud">
            <h2 style="margin:0">TACTICAL SCANNER</h2>
            <div id="status-text" style="font-size: 10px;">SCANNING FOR GHOST SIGNALS...</div>
        </div>
        <a href="/" class="back-btn">< BACK TO TERMINAL</a>
    </div>

    <script>
        function backgroundScan() {
            fetch('/scan')
                .then(res => res.json())
                .then(data => {
                    if (data.status === "found") {
                        const dot = document.createElement('div');
                        dot.className = 'sector';
                        dot.style.top = (Math.random() * 80 + 10) + '%';
                        dot.style.left = (Math.random() * 80 + 10) + '%';
                        dot.style.background = '#00ff00';
                        dot.style.boxShadow = '0 0 10px #00ff00';
                        document.getElementById('map-container').appendChild(dot);
                        document.getElementById('status-text').innerText = "SIGNAL DETECTED: " + data.item.name;
                    }
                });
        }
        setInterval(backgroundScan, 5000);
    </script>
</body>
</html>
