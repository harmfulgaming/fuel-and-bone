<!DOCTYPE html>
<html>
<head>
    <title>Map</title>
</head>
<body>

<h1>World Map</h1>

{% for z in zones %}
<div style="margin:10px; border:1px solid black; padding:10px;">
    <h3>{{ z.name }}</h3>
    <button onclick="harvest({{ z.id }})">Harvest</button>
</div>
{% endfor %}

<script>
function harvest(id){
    fetch(`/harvest/${id}`, {method:"POST"})
    .then(r => r.json())
    .then(data => alert(JSON.stringify(data)));
}
</script>

</body>
</html>
