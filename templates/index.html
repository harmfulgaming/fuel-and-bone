<!DOCTYPE html>
<html>
<head>
    <title>Market</title>
</head>
<body>

<h1>Wallet: {{ wallet }}</h1>

<h2>Items</h2>

{% for item in ledger %}
<div style="border:1px solid #ccc; padding:10px; margin:10px;">
    <h3>{{ item.name }}</h3>
    <p>Rarity: {{ item.rarity }}</p>
    <p>Value: {{ item.cals }}</p>
    <p>Condition: {{ item.condition }}</p>
    <p>Bid: {{ item.current_bid }}</p>
</div>
{% endfor %}

</body>
</html>
